# One workflow: format once, validate the shared root module once, then plan/apply every app under apps/*/ in parallel.
name: Terraform Cloud Run

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform.yml"
      - "modules/**"
      - "apps/**"
      - "scripts/**"

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: 1

jobs:
  discover:
    name: discover apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.apps.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
      - id: apps
        run: |
          python3 << 'PY'
          import json, os
          root = "apps"
          names = sorted(
              d
              for d in os.listdir(root)
              if os.path.isdir(os.path.join(root, d)) and not d.startswith(".")
          )
          if not names:
              print("::error::No app directories under apps/")
              raise SystemExit(1)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"apps={json.dumps(names)}\n")
          print("Apps:", names)
          PY

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - run: bash scripts/terraform.sh fmt

  validate:
    name: validate
    needs: [fmt]
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
    concurrency:
      group: terraform-${{ github.repository }}-validate
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Terraform validate (dev)
        run: bash scripts/terraform.sh validate --workspace dev
      - name: Terraform validate (prod)
        run: bash scripts/terraform.sh validate --workspace prod

  plan-dev:
    name: plan dev
    needs: [discover, validate]
    if: github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.discover.outputs.apps) }}
    runs-on: ubuntu-latest
    env:
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
    concurrency:
      group: terraform-${{ github.repository }}-${{ matrix.app }}-dev
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Check var files
        run: |
          test -f "apps/${{ matrix.app }}/common.tfvars"
          test -f "apps/${{ matrix.app }}/dev.tfvars"
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Terraform plan
        run: |
          bash scripts/terraform.sh plan --workspace dev \
            --var-file "apps/${{ matrix.app }}/common.tfvars" \
            --var-file "apps/${{ matrix.app }}/dev.tfvars"
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.app }}-dev
          path: tfplan
          if-no-files-found: error

  apply-dev:
    name: apply dev
    needs: [discover, plan-dev]
    if: github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.discover.outputs.apps) }}
    runs-on: ubuntu-latest
    environment: dev
    env:
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
    concurrency:
      group: terraform-${{ github.repository }}-${{ matrix.app }}-dev
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.app }}-dev
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - run: bash scripts/terraform.sh apply --workspace dev

  plan-prod:
    name: plan prod
    needs: [discover, validate]
    if: github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.discover.outputs.apps) }}
    runs-on: ubuntu-latest
    env:
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
    concurrency:
      group: terraform-${{ github.repository }}-${{ matrix.app }}-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Check var files
        run: |
          test -f "apps/${{ matrix.app }}/common.tfvars"
          test -f "apps/${{ matrix.app }}/prod.tfvars"
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Terraform plan
        run: |
          bash scripts/terraform.sh plan --workspace prod \
            --var-file "apps/${{ matrix.app }}/common.tfvars" \
            --var-file "apps/${{ matrix.app }}/prod.tfvars"
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.app }}-prod
          path: tfplan
          if-no-files-found: error

  apply-prod:
    name: apply prod
    needs: [discover, plan-prod]
    if: github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.discover.outputs.apps) }}
    runs-on: ubuntu-latest
    environment: prod
    env:
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
    concurrency:
      group: terraform-${{ github.repository }}-${{ matrix.app }}-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.app }}-prod
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - run: bash scripts/terraform.sh apply --workspace prod
