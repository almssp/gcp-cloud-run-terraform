name: Terraform Cloud Run

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform.yml"
      - "modules/**"
      - "apps/**"
      - "scripts/**"

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: 1
  TF_VAR_FILE_APP: ${{ vars.TF_APP || 'example-api' }}
  TF_STATE_PREFIX_BASE: ${{ vars.TF_STATE_PREFIX_BASE || 'freestar' }}
  TF_WORKSPACE_KEY_PREFIX: ${{ vars.TF_WORKSPACE_KEY_PREFIX || 'env' }}

jobs:
  detect:
    name: detect
    runs-on: ubuntu-latest
    outputs:
      run_dev: ${{ steps.pick.outputs.run_dev }}
      run_prod: ${{ steps.pick.outputs.run_prod }}
      validate_workspace: ${{ steps.pick.outputs.validate_workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide dev or prod (or both) from diff
        id: pick
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "${BASE_REF}" --depth=1 2>/dev/null || true
          DIFF=$(git diff --name-only "origin/${BASE_REF}...HEAD" || true)
          APP="${TF_VAR_FILE_APP}"

          run_dev=false
          run_prod=false

          shared='^(\.github/workflows/|.*\.tf$|modules/|apps/'"${APP}"'/common\.tfvars)'
          if echo "${DIFF}" | grep -qE "${shared}"; then
            run_dev=true
            run_prod=true
          fi
          if echo "${DIFF}" | grep -qF "apps/${APP}/dev.tfvars"; then
            run_dev=true
          fi
          if echo "${DIFF}" | grep -qF "apps/${APP}/prod.tfvars"; then
            run_prod=true
          fi

          if [[ "${run_dev}" != "true" && "${run_prod}" != "true" ]]; then
            run_dev=true
          fi

          if [[ "${run_dev}" == "true" ]]; then
            validate_workspace=dev
          else
            validate_workspace=prod
          fi

          echo "run_dev=${run_dev}" >> "$GITHUB_OUTPUT"
          echo "run_prod=${run_prod}" >> "$GITHUB_OUTPUT"
          echo "validate_workspace=${validate_workspace}" >> "$GITHUB_OUTPUT"
          echo "Detected: run_dev=${run_dev} run_prod=${run_prod} validate_workspace=${validate_workspace}"

  fmt:
    name: fmt
    needs: [detect]
    if: needs.detect.outputs.run_dev == 'true' || needs.detect.outputs.run_prod == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

  validate:
    name: validate
    needs: [detect, fmt]
    if: (needs.detect.outputs.run_dev == 'true' || needs.detect.outputs.run_prod == 'true') && (github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    environment: ${{ needs.detect.outputs.validate_workspace }}
    concurrency:
      group: terraform-${{ github.repository }}-${{ vars.TF_APP || 'example-api' }}-validate-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Check var files exist
        run: |
          test -f "apps/${TF_VAR_FILE_APP}/common.tfvars"
          test -f "apps/${TF_VAR_FILE_APP}/${{ needs.detect.outputs.validate_workspace }}.tfvars"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          test -n "${TF_STATE_BUCKET}" || { echo "::error::Set repository or environment variable TF_STATE_BUCKET"; exit 1; }
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_STATE_PREFIX_BASE}" \
            -backend-config="workspace_key_prefix=${TF_WORKSPACE_KEY_PREFIX}"

      - name: Terraform workspace select
        run: terraform workspace select "${{ needs.detect.outputs.validate_workspace }}"

      - name: Terraform Validate
        run: terraform validate

  plan-dev:
    name: plan dev
    needs: [detect, validate]
    if: needs.detect.outputs.run_dev == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: terraform-${{ github.repository }}-${{ vars.TF_APP || 'example-api' }}-dev
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Check var files exist
        run: |
          test -f "apps/${TF_VAR_FILE_APP}/common.tfvars"
          test -f "apps/${TF_VAR_FILE_APP}/dev.tfvars"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_STATE_PREFIX_BASE}" \
            -backend-config="workspace_key_prefix=${TF_WORKSPACE_KEY_PREFIX}"

      - name: Terraform workspace select
        run: terraform workspace select dev

      - name: Terraform Plan
        run: |
          terraform plan -input=false \
            -var-file="apps/${TF_VAR_FILE_APP}/common.tfvars" \
            -var-file="apps/${TF_VAR_FILE_APP}/dev.tfvars" \
            -out=tfplan

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: tfplan
          if-no-files-found: error

  apply-dev:
    name: apply dev
    needs: [plan-dev]
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: terraform-${{ github.repository }}-${{ vars.TF_APP || 'example-api' }}-dev
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-dev

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_STATE_PREFIX_BASE}" \
            -backend-config="workspace_key_prefix=${TF_WORKSPACE_KEY_PREFIX}"

      - name: Terraform workspace select
        run: terraform workspace select dev

      - name: Terraform Apply
        run: terraform apply -input=false tfplan

  plan-prod:
    name: plan prod
    needs: [detect, validate]
    if: needs.detect.outputs.run_prod == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: terraform-${{ github.repository }}-${{ vars.TF_APP || 'example-api' }}-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Check var files exist
        run: |
          test -f "apps/${TF_VAR_FILE_APP}/common.tfvars"
          test -f "apps/${TF_VAR_FILE_APP}/prod.tfvars"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_STATE_PREFIX_BASE}" \
            -backend-config="workspace_key_prefix=${TF_WORKSPACE_KEY_PREFIX}"

      - name: Terraform workspace select
        run: terraform workspace select prod

      - name: Terraform Plan
        run: |
          terraform plan -input=false \
            -var-file="apps/${TF_VAR_FILE_APP}/common.tfvars" \
            -var-file="apps/${TF_VAR_FILE_APP}/prod.tfvars" \
            -out=tfplan

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: tfplan
          if-no-files-found: error

  apply-prod:
    name: apply prod
    needs: [plan-prod]
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: terraform-${{ github.repository }}-${{ vars.TF_APP || 'example-api' }}-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prod

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_STATE_PREFIX_BASE}" \
            -backend-config="workspace_key_prefix=${TF_WORKSPACE_KEY_PREFIX}"

      - name: Terraform workspace select
        run: terraform workspace select prod

      - name: Terraform Apply
        run: terraform apply -input=false tfplan
